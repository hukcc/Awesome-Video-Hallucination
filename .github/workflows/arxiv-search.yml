name: Monthly arXiv Paper Update

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of each month, 09:00 UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  search-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run arXiv search
        run: python scripts/arxiv_search.py

      - name: Commit and push if changes detected
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add new_papers.md data/known_papers.json
          if git diff --cached --quiet; then
            echo "No new papers found. Nothing to commit."
          else
            git commit -m "chore: update new_papers.md with latest arXiv findings ($(date -u +%Y-%m-%d))"
            git push
          fi
