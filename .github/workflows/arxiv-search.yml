name: Monthly arXiv Paper Search

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of each month, 09:00 UTC
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  search-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run arXiv search
        run: python scripts/arxiv_search.py

      - name: Check for new papers
        id: check
        run: |
          if [ -s new_papers.md ]; then
            echo "has_new_papers=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_papers=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_new_papers == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add newly found arXiv papers (${{ steps.date.outputs.today }})"
          title: "[Auto] New arXiv papers found — ${{ steps.date.outputs.today }}"
          body: |
            ## Automated arXiv Paper Search

            New papers related to **video hallucination** have been found on arXiv.

            Please review `new_papers.md` and classify relevant papers into
            the appropriate sections in `README.md`.

            ---
            *This PR was automatically generated by the monthly arXiv search workflow.*
          branch: arxiv-update/${{ steps.date.outputs.today }}
          add-paths: |
            new_papers.md
            data/known_papers.json
